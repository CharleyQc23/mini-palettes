<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nous rejoindre — Mini Palettes Roses | Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="images/favicon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="images/favicon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/favicon-192.png">
  <meta name="theme-color" content="#e91e63">

  <!-- 🔍 SEO -->
  <meta name="description" content="Contactez les Mini Palettes Roses — ligue de hockey récréatif pour filles au Québec. Une question sur les mini palettes ou mini-palettes ? Écrivez-nous !">
  <meta name="keywords" content="mini palettes roses, mini palettes, contact hockey filles Québec, mini-palettes, rejoindre ligue hockey féminin">
  <meta name="author" content="Mini Palettes Roses">
  <link rel="canonical" href="https://www.minipalettes.ca/contact.html">

  <!-- 🌐 Open Graph -->
  <meta property="og:title" content="Nous rejoindre — Mini Palettes Roses">
  <meta property="og:description" content="Vous avez une question sur les Mini Palettes Roses ? Contactez-nous via notre formulaire.">
  <meta property="og:image" content="https://www.minipalettes.ca/images/slide-contact.webp">
  <meta property="og:url" content="https://www.minipalettes.ca/contact.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Mini Palettes Roses">

  <style>
    .form-contact {
      max-width: 600px;
      margin: 2rem auto;
      background: white;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .form-contact label {
      display: block;
      margin-top: 1rem;
      font-weight: bold;
    }

    .form-contact input,
    .form-contact textarea {
      width: 100%;
      padding: 0.6rem;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 0.3rem;
      font-size: 1rem;
      box-sizing: border-box;
    }

    .btn-envoyer {
      margin-top: 1.5rem;
      padding: 0.6rem 1.5rem;
      background-color: #c2185b;
      color: white;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .btn-envoyer:hover {
      background-color: #e91e63;
    }
.ligne-consentement {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-top: 1.5rem;
  flex-wrap: wrap;
}

.ligne-consentement .consentement {
  display: flex;
  align-items: center;
  font-size: 0.95rem;
}

.ligne-consentement input[type="checkbox"] {
  width: 20px;
  height: 20px;
  margin-right: 0.5rem;
}

  </style>
</head>

<!-- 📝 Bandeau Cookies -->
<div id="cookie-banner" class="cookie-banner">
  <p>
    Nous utilisons des cookies conformément à la Loi 25 sur la protection des renseignements personnels des citoyens du Québec.
    <a href="politique.html" class="cookie-link">En savoir plus</a>
  </p>
  <div class="cookie-buttons">
    <button id="accept-cookies" class="btn-cookie">Accepter</button>
    <button id="refuse-cookies" class="btn-cookie refuse">Seulement les témoins nécessaires</button>
  </div>
</div>
<script src="cookies.js"></script>

<body>
<header class="banniere">
  <div class="header-container">
    <div class="logo-texte">
      <a href="index.html">
        <img src="images/MPR_logo_FINAL-vectorise.png" alt="Logo Mini Palettes Roses" class="logo-site">
      </a>
      <div class="texte-site">
        <h1>Mini-palettes roses</h1>
        <p>Le hockey pour le plaisir, entre filles</p>
      </div>
    </div>

    <nav class="menu-nav">
      <a href="index.html" class="nav-link">Accueil</a>
      <a href="a-propos.html" class="nav-link">À propos</a>
      <a href="boutique.html" class="nav-link">Boutique</a>
      <a href="contact.html" class="nav-link">Contact</a>
    </nav>
  </div>
</header>

<main>
  <section class="accueil">
    <div class="texte-centré">
      <h2>Nous rejoindre</h2>
      <p>Tu as une question ? Écris-nous 💌</p>
    </div>

<form class="form-contact" action="https://formsubmit.co/c.guernon@hotmail.ca" method="POST">
  <input type="hidden" name="_captcha" value="false">
  <input type="hidden" name="_next" value="merci.html">
  <input type="hidden" name="_cc" value="minipalettesroses@gmail.com">

  <label for="nom">Nom :</label>
  <input type="text" id="nom" name="Nom" required>

  <label for="email">Courriel pour vous recontacter :</label>
  <input type="email" id="email" name="Courriel" required>

  <label for="message">Message :</label>
  <textarea id="message" name="Message" rows="5" required></textarea>

  <div class="ligne-consentement">
    <label class="consentement">
      <input type="checkbox" id="consentement" name="Consentement" value="J'accepte" required>
      J'accepte que ces informations soient utilisées pour me recontacter.
    </label>

  <button type="submit" class="btn-envoyer">Envoyer</button>
    </div>
</form>

  </section>
</main>

<style>
  .texte-centré {
    text-align: center;
  }
</style>


<div id="footer-container"></div>
<script>
  fetch('footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer-container').outerHTML = data;
    });
</script>

<script>
  const form = document.querySelector('.form-contact');
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
    }).then(() => {
      window.location.href = 'merci.html';
    }).catch(err => {
      alert('Une erreur est survenue, réessayez.');
      console.error(err);
    });
  });
</script>

</body>
</html>
