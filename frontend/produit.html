<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mini-palettes roses - Détail produit</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://js.stripe.com/v3/"></script>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="images/favicon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="images/favicon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/favicon-192.png">
  <meta name="theme-color" content="#e91e63">
</head>

<body data-subtitle="La boutique des futures Palettes Roses !">

<div class="bandeau-taxes">TOUS LES PRIX INCLUENT LES TAXES</div>

<div id="nav-container"></div>

<button id="btn-panier" title="Voir le panier">🛒 (<span id="nb-items">0</span>)</button>

<div id="sidebar-panier" class="sidebar-closed">
  <button id="btn-fermer-panier">✖</button>
  <h2>Ton panier</h2>
  <ul id="liste-panier"></ul>
  <p><strong>Total : <span id="total">0.00</span> $</strong></p>
  <button id="payer">Procéder au paiement</button>
</div>

<main>
  <div class="contenu-produit" id="fiche-produit">
    <h2>Chargement du produit...</h2>
  </div>
</main>

<div id="footer-container"></div>

<script>
  // --- Fiche produit
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  const params = new URLSearchParams(window.location.search);
  const idProduit = params.get('id');
  if (idProduit) {
    fetch('produits.json')
      .then(res => res.json())
      .then(produits => {
        if (!produits[idProduit]) return;
        const produit = produits[idProduit];
        const div = document.getElementById('fiche-produit');
        div.innerHTML = `
          <img src="${produit.image}" alt="${escapeHtml(produit.nom)}" />
          <h2>${escapeHtml(produit.nom)}</h2>
          <p><strong>${produit.prix.toFixed(2)} $</strong></p>

          <label for="taille">Choisis une grandeur :</label><br>
          <select id="taille">
            <option value="">-- Sélectionner --</option>
            <option value="X-Small">X-Small</option>
            <option value="Small">Small</option>
            <option value="Medium">Medium</option>
            <option value="Large">Large</option>
            <option value="X-Large">X-Large</option>
          </select><br><br>

          <div class="options-broderie">
            <p><strong>Personnalisation (incluse) :</strong></p>
            <label for="champ-nom">Nom à broder :</label><br>
            <input type="text" id="champ-nom" placeholder="ex: Juliette" /><br><br>
            <label for="champ-numero">Numéro à broder :</label><br>
            <input type="text" id="champ-numero" placeholder="ex: 21" maxlength="2" pattern="\d{1,2}" /><br><br>
          </div>

          <label for="quantite">Quantité :</label><br>
          <input type="number" id="quantite" name="quantite" min="1" value="1" style="width:60px; padding:0.3rem; border-radius:6px; border:1px solid #ccc;" /><br><br>

          <button id="ajouter-panier" class="btn-ajouter" disabled>Ajouter au panier</button><br>
          <button class="btn-retour" onclick="window.location.href='boutique.html'">← Retour à la boutique</button>
        `;

        const selectTaille = document.getElementById('taille');
        const inputQuantite = document.getElementById('quantite');
        const boutonAjouter = document.getElementById('ajouter-panier');

        function checkReady() {
          const qte = parseInt(inputQuantite.value, 10);
          boutonAjouter.disabled = (!selectTaille.value || !qte || qte < 1);
        }

        selectTaille.addEventListener('change', checkReady);
        inputQuantite.addEventListener('input', checkReady);

        boutonAjouter.addEventListener('click', () => {
          const taille = selectTaille.value;
          const quantite = parseInt(inputQuantite.value, 10);
          const nomBrode = document.getElementById('champ-nom')?.value || '';
          const numeroBrode = document.getElementById('champ-numero')?.value || '';
          const personnalisation = [
            nomBrode ? `Nom : ${nomBrode}` : '',
            numeroBrode ? `# : ${numeroBrode}` : ''
          ].filter(Boolean).join(', ');

          const prixUnitaire = produit.prix;
          panier.push({
            id: idProduit,
            nom: produit.nom,
            taille,
            prixUnitaire,
            prix: prixUnitaire * quantite,
            quantite,
            personnalisation
          });
          localStorage.setItem('panier', JSON.stringify(panier));
          animationPanier();
          majNbItems();
          afficherPanier();
          document.getElementById('sidebar-panier').classList.add('open');
          alert('Produit ajouté au panier !');
        });

        checkReady();
      });
  }

  // --- Payer (depuis produit.html)
  document.addEventListener('DOMContentLoaded', () => {
    const btnPayer = document.getElementById('payer');
    if (!btnPayer) return;
    btnPayer.addEventListener('click', async () => {
      if (!panier.length) { alert('Ton panier est vide !'); return; }
      try {
        const response = await fetch('/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ panier })
        });
        const data = await response.json();
        if (!data.id) { alert('Erreur lors de la création de la session.'); return; }
        const stripe = Stripe('pk_live_51RlJVlDmX69ZLUq0eiZ3Vi6R2Nk7SOrHcCQ16fqpmRsWJWULAj4GPRtmYCmRLEJ5X2JW9XfFY3E0ZjA3Jmu0IFmG00Cmh7Km7v');
        await stripe.redirectToCheckout({ sessionId: data.id });
      } catch(e) {
        alert('Erreur lors du paiement.');
      }
    });
  });
</script>
<div id="footer-container"></div>
<script src="cookies.js"></script>
<script src="script.js"></script>
</body>
</html>
