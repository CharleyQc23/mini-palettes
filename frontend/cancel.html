<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Paiement annulé - Mini Palettes Roses</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="images/favicon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="images/favicon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/favicon-192.png">
  <meta name="theme-color" content="#e91e63">
  <style>
    body { text-align: center; padding: 3rem 1rem; }
    .contenu { color: var(--primary-dark); }
  </style>
</head>
<body>
  <div class="contenu">
    <h2>❌ Paiement annulé</h2>
    <p>Le paiement a été annulé. Aucun montant n’a été débité.</p>
    <div class="loader"></div>
    <p>Tu seras redirigé vers l’accueil dans <span id="compte-rebours">10</span> secondes...</p>
    <a href="index.html" class="btn-retour">Retour maintenant</a>
  </div>

  <script>
    // Redirection après 10 secondes
    let secondes = 10;
    const compteur = document.getElementById('compte-rebours');
    const interval = setInterval(() => {
      secondes--;
      compteur.textContent = secondes;
      if (secondes <= 0) {
        clearInterval(interval);
        window.location.href = 'index.html';
      }
    }, 1000);
  </script>
</body>
</html>
