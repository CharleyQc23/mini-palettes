<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Boutique — Mini Palettes Roses | Vêtements hockey filles personnalisés</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://js.stripe.com/v3/"></script>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="images/favicon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="images/favicon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/favicon-192.png">
  <meta name="theme-color" content="#e91e63">

  <!-- 🔍 SEO -->
  <meta name="description" content="Boutique Mini Palettes Roses — vêtements et accessoires personnalisés pour les joueuses de hockey. Mini palettes, mini-palettes : kangourous, t-shirts, tuques brodés.">
  <meta name="keywords" content="mini palettes roses, mini palettes, mini-palettes, boutique hockey filles, vêtements hockey personnalisés, broderie hockey Québec">
  <meta name="author" content="Mini Palettes Roses">
  <link rel="canonical" href="https://www.minipalettes.ca/boutique.html">

  <!-- 🌐 Open Graph -->
  <meta property="og:title" content="Boutique — Mini Palettes Roses">
  <meta property="og:description" content="Vêtements et accessoires personnalisés Mini Palettes Roses pour les futures joueuses de hockey. Broderie incluse, taxes incluses.">
  <meta property="og:image" content="https://www.minipalettes.ca/images/slide-boutique.webp">
  <meta property="og:url" content="https://www.minipalettes.ca/boutique.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Mini Palettes Roses">

</head>

<body data-subtitle="La boutique des futures Palettes Roses !">
<div class="bandeau-taxes">TOUS LES PRIX INCLUENT LES TAXES</div>

<div id="nav-container"></div>

<button id="btn-panier" title="Voir le panier">🛒  (<span id="nb-items">0</span>)</button>

<div id="sidebar-panier" class="sidebar-closed">
  <button id="btn-fermer-panier">✖</button>
  <h2>Ton panier</h2>
  <ul id="liste-panier"></ul>
  <p><strong>Total : <span id="total">0.00</span> $</strong></p>
  <button id="payer">Procéder au paiement</button>
</div>

<main class="fade-in">
  <section id="galerie-produits" class="galerie"></section>
</main>

<script>
// Chargement de la galerie produits
function escapeHtmlLocal(str){ if(!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

fetch('produits.json')
  .then(res=>res.json())
  .then(produits=>{
    const galerie=document.getElementById('galerie-produits'); galerie.innerHTML='';
    Object.keys(produits).forEach(id=>{
      const p=produits[id];
      const div=document.createElement('div');
      div.className='produit';
      div.innerHTML=`
        <a href="produit.html?id=${id}" class="lien-produit">
          <img src="${p.image}" alt="${escapeHtmlLocal(p.nom)}" />
          <h3>${escapeHtmlLocal(p.nom)}</h3>
          <p><strong>${p.prix.toFixed(2)} $</strong></p>
        </a>`;
      galerie.appendChild(div);
    });
  })
  .catch(err=>console.error('Erreur chargement produits.json :', err));

// Payer (version boutique avec validation)
document.addEventListener('DOMContentLoaded', () => {
  const btnPayer = document.getElementById('payer');
  if (!btnPayer) return;
  btnPayer.addEventListener('click', async () => {
    if (!panier.length) { alert('Ton panier est vide !'); return; }

    const panierValide = panier.filter(item =>
      item.nom && typeof item.nom === 'string' &&
      Number.isInteger(Number(item.quantite)) && Number(item.quantite) >= 1 &&
      !isNaN(Number(item.prixUnitaire)) && Number(item.prixUnitaire) > 0
    ).map(item => ({
      ...item,
      quantite: Math.min(Math.max(Number(item.quantite), 1), 99),
      prixUnitaire: Number(item.prixUnitaire),
      prix: Math.min(Math.max(Number(item.quantite), 1), 99) * Number(item.prixUnitaire)
    }));

    if (!panierValide.length) { alert('Aucun article valide à payer !'); return; }

    try {
      const response = await fetch('/create-checkout-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ panier: panierValide })
      });
      const data = await response.json();
      if (data.error) { alert('Erreur serveur : ' + data.error); return; }
      if (!data.id) { alert('Erreur : aucun ID de session reçu'); return; }
      const stripe = Stripe('pk_live_51RlJVlDmX69ZLUq0eiZ3Vi6R2Nk7SOrHcCQ16fqpmRsWJWULAj4GPRtmYCmRLEJ5X2JW9XfFY3E0ZjA3Jmu0IFmG00Cmh7Km7v');
      const { error } = await stripe.redirectToCheckout({ sessionId: data.id });
      if (error) alert('Erreur Stripe : ' + error.message);
    } catch (err) {
      alert('Erreur lors de la création de la session : ' + err.message);
    }
  });
});
</script>

<div id="footer-container"></div>

<script src="cookies.js"></script>
<script src="script.js"></script>

<!-- Pop-up de pause de vente -->
<div id="pause-vente-overlay" style="
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(3px);
  z-index: 9998;
">
</div>

<div id="pause-vente-popup" style="
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1);
  background: #fff0f6;
  border: 3px solid #f8bbd0;
  border-radius: 25px;
  padding: 2rem 2.5rem;
  text-align: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  z-index: 9999;
  width: min(90%, 400px);
  animation: popIn 0.5s ease forwards;
">
  <h2 style=" color: #c2185b; font-size: 2rem;">Boutique à venir bientôt 💕</h2>
  <p style="font-family: sans-serif; color: #555; margin-top: 1rem;">
    La boutique est présentement en construction !<br>
  </p>
  <button onclick="window.location.href='index.html'" style="
    margin-top: 1.5rem;
    background-color: #c2185b;
    color: white;
    border: none;
    padding: 0.8rem 1.5rem;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1rem;
    transition: background-color 0.3s;
  " onmouseover="this.style.backgroundColor='#ad1457'" onmouseout="this.style.backgroundColor='#c2185b'">
    Retour au menu principal
  </button>
</div>


<script>
  const venteEnPause = true;

  if (venteEnPause) {
    document.getElementById('pause-vente-overlay').style.display = 'block';
    document.getElementById('pause-vente-popup').style.display = 'block';
    document.body.style.overflow = 'hidden';
    document.querySelector('main').style.pointerEvents = 'none';
    document.querySelector('header').style.pointerEvents = 'none';
    document.querySelector('#btn-panier').style.pointerEvents = 'none';
  }
</script>

</body>
</html>
